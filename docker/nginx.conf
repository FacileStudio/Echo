worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm font/otf;
    gzip_min_length 256;

    types {
        application/wasm wasm;
        font/otf otf;
    }

    server {
        listen 80;
        server_name _;

        root /srv/echo;
        index index.html;

        ssi on;
        ssi_types application/x-javascript application/javascript;

        # Static assets with long cache
        location ~* \.(js|css|wasm|otf|ttf|woff2?|png|jpg|svg|ico|json|mp3|ogg|wav)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # BOSH proxy to prosody
        location /http-bind {
            proxy_pass http://echo-prosody:5280/http-bind;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Host $http_host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # XMPP WebSocket proxy to prosody
        location /xmpp-websocket {
            proxy_pass http://echo-prosody:5280/xmpp-websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_read_timeout 900s;
        }

        # Colibri WebSocket proxy to JVB
        location ~ ^/colibri-ws/(.*)$ {
            proxy_pass http://echo-jvb:9090/colibri-ws/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_read_timeout 900s;
        }

        # config.js needs SSI processing
        location = /config.js {
            ssi on;
            ssi_types application/x-javascript application/javascript;
            add_header Content-Type application/javascript;
            expires 1h;
        }

        # interface_config.js
        location = /interface_config.js {
            add_header Content-Type application/javascript;
            expires 1h;
        }

        # SPA fallback: any room name serves index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
