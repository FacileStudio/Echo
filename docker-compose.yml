services:
  web:
    container_name: echo-web
    image: jitsi/web:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ${CONFIG}/web:/config:Z
      - ${CONFIG}/web/crontabs:/var/spool/cron/crontabs:Z
      - ${CONFIG}/transcripts:/usr/share/jitsi-meet/transcripts:Z
    environment:
      - DISABLE_HTTPS=1
      - DISABLE_DEEP_LINKING=1
      - ENABLE_BREAKOUT_ROOMS=1
      - ENABLE_PREJOIN_PAGE=1
      - ENABLE_P2P=1
      - ENABLE_WELCOME_PAGE=1
      - ENABLE_CLOSE_PAGE=1
      - ENABLE_RECORDING=0
      - ENABLE_SIMULCAST=1
      - ENABLE_XMPP_WEBSOCKET=1
      - ENABLE_COLIBRI_WEBSOCKET=1
      - ENABLE_TRANSCRIPTIONS=${ENABLE_TRANSCRIPTIONS:-0}
      - PUBLIC_URL
      - TZ
      - XMPP_AUTH_DOMAIN
      - XMPP_BOSH_URL_BASE
      - XMPP_DOMAIN
      - XMPP_GUEST_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_PORT
      - XMPP_RECORDER_DOMAIN
    networks:
      meet.jitsi:
      dokploy-network:
    depends_on:
      - jvb

  prosody:
    container_name: echo-prosody
    image: jitsi/prosody:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    expose:
      - "5222"
      - "5269"
      - "5347"
      - "5280"
    volumes:
      - ${CONFIG}/prosody/config:/config:Z
      - ${CONFIG}/prosody/prosody-plugins-custom:/prosody-plugins-custom:Z
    environment:
      - ENABLE_AUTH=${ENABLE_AUTH:-0}
      - ENABLE_GUESTS=${ENABLE_GUESTS:-1}
      - ENABLE_BREAKOUT_ROOMS=1
      - ENABLE_END_CONFERENCE=1
      - ENABLE_LOBBY=1
      - ENABLE_XMPP_WEBSOCKET=1
      - ENABLE_TRANSCRIPTIONS=${ENABLE_TRANSCRIPTIONS:-0}
      - AUTH_TYPE=${AUTH_TYPE:-internal}
      - JICOFO_AUTH_PASSWORD
      - JVB_AUTH_USER
      - JVB_AUTH_PASSWORD
      - PUBLIC_URL
      - TZ
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_GUEST_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_HIDDEN_DOMAIN
      - XMPP_PORT
      - XMPP_RECORDER_DOMAIN
    networks:
      meet.jitsi:
        aliases:
          - ${XMPP_SERVER:-xmpp.meet.jitsi}

  jicofo:
    container_name: echo-jicofo
    image: jitsi/jicofo:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    volumes:
      - ${CONFIG}/jicofo:/config:Z
    environment:
      - AUTH_TYPE=${AUTH_TYPE:-internal}
      - ENABLE_AUTH=${ENABLE_AUTH:-0}
      - ENABLE_AUTO_OWNER=1
      - ENABLE_RECORDING=0
      - ENABLE_SCTP=1
      - ENABLE_TRANSCRIPTIONS=${ENABLE_TRANSCRIPTIONS:-0}
      - JICOFO_AUTH_PASSWORD
      - JICOFO_ENABLE_BRIDGE_HEALTH_CHECKS=true
      - JICOFO_ENABLE_HEALTH_CHECKS=true
      - JVB_BREWERY_MUC
      - TZ
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_HIDDEN_DOMAIN
      - XMPP_SERVER
      - XMPP_PORT
    depends_on:
      - prosody
    networks:
      meet.jitsi:

  jvb:
    container_name: echo-jvb
    image: jitsi/jvb:${JITSI_IMAGE_VERSION:-stable}
    restart: unless-stopped
    ports:
      - "${JVB_PORT:-10000}:${JVB_PORT:-10000}/udp"
    volumes:
      - ${CONFIG}/jvb:/config:Z
    environment:
      - ENABLE_COLIBRI_WEBSOCKET=1
      - ENABLE_SCTP=1
      - JVB_ADVERTISE_IPS=${JVB_ADVERTISE_IPS}
      - JVB_AUTH_USER
      - JVB_AUTH_PASSWORD
      - JVB_BREWERY_MUC
      - JVB_PORT
      - JVB_STUN_SERVERS
      - PUBLIC_URL
      - TZ
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_SERVER
      - XMPP_PORT
    depends_on:
      - prosody
    networks:
      meet.jitsi:

networks:
  meet.jitsi:
  dokploy-network:
    external: true
